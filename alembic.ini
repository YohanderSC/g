# =====================================================
# ALEMBIC - CONFIGURACIÓN DE MIGRACIONES
# =====================================================
# Documentación: https://alembic.sqlalchemy.org
#
# Uso básico:
#   alembic revision --autogenerate -m "descripcion"
#   alembic upgrade head
#   alembic downgrade -1
# =====================================================

[alembic]
# Ruta al directorio de scripts de migración
script_location = alembic

# Formato del nombre de los archivos de migración
# Incluye timestamp y descripción corta
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Directorio de trabajo (relativo al alembic.ini)
prepend_sys_path = .

# Zona horaria para los timestamps de migración
timezone = UTC

# Truncar mensajes de migración largos a N caracteres (0 = sin límite)
truncate_slug_length = 40

# Si se debe incluir las revisiones de ramas en el output
revision_environment = false

# Comparar tipos de columna al generar migraciones automáticas
compare_type = true

# ── URL de conexión ───────────────────────────────
# Se sobreescribe desde env.py usando la variable DATABASE_URL del .env
# Este valor es el fallback si no hay variable de entorno
#sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/ruleta_db
sqlalchemy.url = postgresql+psycopg://postgres:Conejo.30@localhost:8080/ruleta_db
# por que tengo configurado asi jajaja

# ── Logging ───────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
